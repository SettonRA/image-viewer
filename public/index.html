<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Image Viewer</h1>
    <div class="toolbar">
      <span id="image-count"></span>
      <div class="sort-controls">
        <label for="sort-select">Sort:</label>
        <select id="sort-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="name-asc">Name A–Z</option>
          <option value="name-desc">Name Z–A</option>
        </select>
      </div>
      <div class="storage-meter" id="storage-meter" title="Storage used">
        <div class="storage-bar-track">
          <div id="storage-bar" class="storage-bar"></div>
        </div>
        <span id="storage-text" class="storage-text"></span>
      </div>
    </div>
  </header>

  <main>
    <div id="gallery" class="gallery"></div>
    <div id="empty-state" class="empty-state hidden">
      <p>No images found. Drop images here or into the <code>images/</code> folder.</p>
    </div>
  </main>

  <!-- Drop overlay -->
  <div id="drop-overlay" class="drop-overlay hidden" aria-hidden="true">
    <div class="drop-overlay-inner">
      <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Drop images to upload</p>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <!-- Delete confirmation modal -->
  <div id="confirm-modal" class="confirm-modal hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="confirm-box">
      <h2 id="confirm-title">Delete image?</h2>
      <p id="confirm-filename" class="confirm-filename"></p>
      <p class="confirm-body">This will permanently delete the file. This cannot be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="confirm-btn confirm-btn-cancel">Cancel</button>
        <button id="confirm-delete" class="confirm-btn confirm-btn-delete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox hidden">
    <button id="lightbox-close" class="lightbox-close" aria-label="Close">&times;</button>
    <div id="lightbox-prev" class="lightbox-zone lightbox-prev" role="button" aria-label="Previous"></div>
    <div id="lightbox-next" class="lightbox-zone lightbox-next" role="button" aria-label="Next"></div>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
      <video id="lightbox-video" controls playsinline autoplay loop></video>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
